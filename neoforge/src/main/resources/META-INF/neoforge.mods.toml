modLoader="javafml"
loaderVersion="[1,)"
license="${mod_license}"

[[mods]]
modId="${mod_id}"
version="${mod_version}+neoforge-${minecraft_version}"
displayName="${mod_name}"
logoFile="img/icon256.png"
authors="${mod_authors}"
description='''${mod_description}'''

[[dependencies.proximitycrafting]]
modId="minecraft"
mandatory=true
versionRange="${minecraft_version_range}"
ordering="NONE"
side="BOTH"

[[dependencies.proximitycrafting]]
modId="architectury"
mandatory=true
versionRange="[${architectury_api_version},)"
ordering="AFTER"
side="BOTH"
