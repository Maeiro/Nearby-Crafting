modLoader="javafml"
loaderVersion="${loader_version_range}"
license="${mod_license}"

[[mods]]
modId="${mod_id}"
version="${mod_version}+forge-${minecraft_version}"
displayName="${mod_name}"
logoFile="img/icon256.png"
authors="${mod_authors}"
description='''${mod_description}'''

[[dependencies.proximitycrafting]]
modId="forge"
mandatory=true
versionRange="${forge_version_range}"
ordering="NONE"
side="BOTH"

[[dependencies.proximitycrafting]]
modId="minecraft"
mandatory=true
versionRange="${minecraft_version_range}"
ordering="NONE"
side="BOTH"

[[dependencies.proximitycrafting]]
modId="jei"
mandatory=false
versionRange="[15.0.0,)"
ordering="AFTER"
side="CLIENT"

[[dependencies.proximitycrafting]]
modId="emi"
mandatory=false
versionRange="[1.0.0,)"
ordering="AFTER"
side="CLIENT"

[[dependencies.proximitycrafting]]
modId="sophisticatedbackpacks"
mandatory=false
versionRange="[1.0.0,)"
ordering="AFTER"
side="BOTH"
